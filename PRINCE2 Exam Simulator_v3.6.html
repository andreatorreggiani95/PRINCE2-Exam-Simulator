<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRINCE2 7 Pro - Simulator V3.6</title>
    <style>
        :root {
            --bg: #0f172a; --card: #1e293b; --primary: #38bdf8;
            --secondary: #818cf8; --text: #f1f5f9; --text-dim: #94a3b8;
            --success: #22c55e; --danger: #ef4444; --accent: #f59e0b;
            --warning: #facc15;
        }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 10px; display: flex; justify-content: center; }
        .app-container { max-width: 1000px; width: 100%; background: var(--card); padding: 30px; border-radius: 24px; box-shadow: 0 25px 50px rgba(0,0,0,0.5); min-height: 90vh; position: relative; }
        
        nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 15px; }
        .logo { font-size: 1.5rem; font-weight: 800; background: linear-gradient(90deg, var(--primary), var(--secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .screen { display: none; animation: fadeIn 0.4s ease; }
        .screen.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .btn { background: #334155; color: white; border: none; padding: 20px; border-radius: 16px; cursor: pointer; font-size: 1rem; font-weight: 600; transition: all 0.2s; border: 1px solid rgba(255,255,255,0.05); }
        .btn:hover { background: #475569; transform: translateY(-2px); }
        .btn-primary { background: linear-gradient(135deg, var(--primary), var(--secondary)); }
        
        .ai-toggle-container {
            background: rgba(56, 189, 248, 0.1);
            border: 1px solid var(--primary);
            padding: 15px;
            border-radius: 16px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: background 0.3s;
        }
        .ai-toggle-container:hover { background: rgba(56, 189, 248, 0.15); }
        .ai-toggle-container input { width: 22px; height: 22px; cursor: pointer; accent-color: var(--primary); }
        .ai-label { font-weight: 600; font-size: 1rem; color: var(--primary); }

        .question-card { background: #1e293b; padding: 20px; border-radius: 16px; margin-bottom: 20px; }
        .options { display: flex; flex-direction: column; gap: 10px; margin-top: 15px; }
        .option { background: #334155; padding: 15px; border-radius: 12px; cursor: pointer; transition: 0.2s; border: 1px solid transparent; display: flex; align-items: center; gap: 10px; line-height: 1.4; }
        .option:hover { background: #475569; }
        .option.selected { border-color: var(--primary); background: rgba(56, 189, 248, 0.1); }
        .option.correct { background: rgba(34, 197, 94, 0.2); border-color: var(--success); }
        .option.incorrect { background: rgba(239, 68, 68, 0.2); border-color: var(--danger); }
        
        .progress-bar { width: 100%; height: 8px; background: #334155; border-radius: 4px; margin-bottom: 20px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--primary); width: 0%; transition: width 0.3s; }
        
        .stats-badge { background: #334155; padding: 4px 12px; border-radius: 20px; font-size: 0.8rem; font-weight: 600; }
        #result-summary { text-align: center; padding: 30px; border-radius: 24px; margin-bottom: 20px; }
        .pass { color: var(--success); }
        .fail { color: var(--danger); }
        .timer { font-family: monospace; font-size: 1.2rem; color: var(--accent); }
    </style>
</head>
<body>
    <div class="app-container">
        <nav>
            <div class="logo">PRINCE2 7 Pro</div>
            <div id="quiz-timer" class="timer"></div>
            <div class="stats-badge" id="category-tag">V3.6</div>
        </nav>

        <div id="screen-home" class="screen active">
            <h2 style="margin-top:0">Pannello di Controllo</h2>
            <p style="color: var(--text-dim)">Scegli la modalità. La distribuzione delle categorie segue lo standard ufficiale.</p>
            
            <label class="ai-toggle-container">
                <input type="checkbox" id="ai-toggle">
                <div class="ai-label">🤖 Includi Pool domande AI (Extra)</div>
            </label>

            <div class="btn-grid">
                <button class="btn" onclick="startQuiz(15)"><b>Quiz Super Rapido</b><br><small>15 Domande - Lampo</small></button>
                <button class="btn" onclick="startQuiz(30)"><b>Quiz Rapido</b><br><small>30 Domande - Mix</small></button>
                <button class="btn btn-primary" style="grid-column: span 2;" onclick="startQuiz(60)"><b>Simulazione Completa</b><br><small>60 Domande - 60 Minuti</small></button>
                <button class="btn" onclick="showHistory()"><b>Storico Test</b><br><small>Vedi Progressi</small></button>
                <button class="btn" onclick="startHardMode()"><b>Hard Mode</b><br><small>Focus Errori</small></button>
            </div>
        </div>

        <div id="screen-quiz" class="screen">
            <div class="progress-bar"><div id="progress-fill" class="progress-fill"></div></div>
            <div id="question-container"></div>
            <div style="display: flex; justify-content: space-between; gap: 10px; margin-top: 20px;">
                <button class="btn" id="btn-prev" onclick="prevQuestion()" style="padding: 12px 25px; flex: 1;">Indietro</button>
                
                <button class="btn" onclick="if(confirm('Vuoi annullare il test e tornare alla home?')) location.reload()" style="padding: 12px 25px; background: #475569; flex: 1;">Annulla</button>
                
                <button class="btn btn-primary" id="btn-next" onclick="nextQuestion()" style="padding: 12px 25px; flex: 1;">Avanti</button>
            </div>
        </div>

        <div id="screen-results" class="screen">
            <div id="result-summary"></div>
            <h3>Revisione Dettagliata</h3>
            <div id="review-container"></div>
            <button class="btn btn-primary" style="width: 100%; margin-top: 20px;" onclick="location.reload()">Torna alla Home</button>
        </div>

        <div id="screen-history" class="screen">
            <h3>Storico Risultati</h3>
            <div id="history-list"></div>
            <button class="btn" style="width: 100%; margin-top: 20px;" onclick="showScreen('home')">Indietro</button>
        </div>
    </div>

    <script>
        // ==========================================
        // 1. INCOLLA QUI LE TUE 120 DOMANDE ORIGINALI
        // ==========================================
        const QUESTIONS = [
            {
                "id": 1,
                "category": "Understand key concepts",
                "question": "Which statement describes the project context?",
                "options": [
                "A. It should be understood by stakeholders so that the principles are applied appropriately",
                "B. It explains how each aspect of project management should be applied for the processes to be effective",
                "C. It guides the progression from pre-project activity through the stages of the project lifecycle",
                "D. It ensures an understanding of the needs of stakeholders, and the relationships between them"
                ],
                "correct_answer": "A",
                "explanation": "Comprendere il contesto del progetto è essenziale affinché gli stakeholder possano adattare e applicare i principi di PRINCE2 in modo appropriato alle circostanze specifiche del progetto."
            },
            {
                "id": 2,
                "category": "Understand key concepts",
                "question": "Which is a characteristic of a project that distinguishes it from business as usual?",
                "options": [
                "A. Projects continue after business as usual resumes",
                "B. Projects include ongoing management of operations",
                "C. Every project will be different to previous projects",
                "D. Project work is generally less risky than business as usual work"
                ],
                "correct_answer": "C",
                "explanation": "Ogni progetto introduce un elemento di unicità e cambiamento, che lo rende diverso dai precedenti, contrariamente alle operazioni di routine (Business as Usual) che sono ripetitive."
            },
            {
                "id": 3,
                "category": "Understand principles",
                "question": "The project board has decided that the project should close prematurely as the external environment has changed. Which principle is being applied?",
                "options": [
                "A. Learn from experience",
                "B. Tailor to suit the project",
                "C. Manage by exception",
                "D. Ensure continued business justification"
                ],
                "correct_answer": "D",
                "explanation": "Il principio 'Ensure continued business justification' stabilisce che un progetto debba essere chiuso prematuramente se i cambiamenti (es. nell'ambiente esterno) fanno venire meno la sua giustificazione commerciale."
            },
            {
                "id": 4,
                "category": "Understand principles",
                "question": "Which statement about the 'define roles, responsibilities and relationships' principle is CORRECT?",
                "options": [
                "A. The project management team should consist exclusively of internal stakeholders",
                "B. An organization's day-to-day management structures are likely to be suited to control the project work",
                "C. The project board should exclude external supplier representatives",
                "D. Suppliers are stakeholders that can be external to the business"
                ],
                "correct_answer": "D",
                "explanation": "I fornitori (Suppliers) fanno parte dell'ecosistema del progetto e possono essere entità esterne all'organizzazione che commissiona il lavoro."
            },
            {
                "id": 5,
                "category": "Understand principles",
                "question": "Which principle is being applied when setting limits for the seven aspects of performance to enable the project manager to work effectively?",
                "options": [
                "A. Manage by exception",
                "B. Learn from experience",
                "C. Tailor to suit the project",
                "D. Define roles, responsibilities and build relationships"
                ],
                "correct_answer": "A",
                "explanation": "Impostare limiti (tolleranze) sui sette aspetti delle prestazioni permette di delegare l'autorità e di intervenire solo quando tali limiti vengono superati, applicando il principio 'Manage by exception'."
            },
            {
                "id": 6,
                "category": "Understand principles",
                "question": "What does the 'ensure continued business justification' principle facilitate?",
                "options": [
                "A. That the project has a business stakeholder to ensure the investment continues to be justified",
                "B. That the project remains desirable, viable and achievable as the project progresses",
                "C. That products delivered by the project meet their quality requirements",
                "D. That the PRINCE2 project management method is suited to the scale of investment"
                ],
                "correct_answer": "B",
                "explanation": "La continua giustificazione di business assicura che il progetto rimanga desiderabile, fattibile e realizzabile (desirable, viable, achievable) per tutta la sua durata."
            },
            {
                "id": 7,
                "category": "Understand principles",
                "question": "Which statement describes how the principles support effective project management?",
                "options": [
                "A. They allow the project team to decide how the method should be applied on the project",
                "B. They take into account industry-specific models as PRINCE2 is generic",
                "C. They rely on a common vocabulary that should be applied as defined in PRINCE2",
                "D. They should be applied in the same way across projects within an organization"
                ],
                "correct_answer": "A",
                "explanation": "I principi PRINCE2 forniscono un quadro di riferimento, consentendo al team di progetto di decidere come il metodo debba essere adattato e applicato specificamente per il loro progetto (Tailor to suit the project context)."
            },
            {
                "id": 8,
                "category": "Understand people",
                "question": "Which statement describes leadership on a project?",
                "options": [
                "A. It is best done through collaboration across the project ecosystem",
                "B. It is the set of shared attitudes, values and goals for the project",
                "C. It is a control that takes place when a specific event occurs",
                "D. It is instructing the execution of tasks in line with agreed ways of working"
                ],
                "correct_answer": "A",
                "explanation": "In PRINCE2 7, la leadership efficace è guidata dalla collaborazione in tutto l'ecosistema del progetto, piuttosto che dal semplice comando e controllo."
            },
            {
                "id": 9,
                "category": "Understand people",
                "question": "Which is a definition of co-creation?",
                "options": [
                "A. Working with key influencers to ensure the agreed ways of working are adopted by all areas of the project ecosystem",
                "B. Modifying any of the approved management products that are part of the project baseline",
                "C. Ensuring decisions made at stage boundaries are informed by continued business justification",
                "D. Applying management control whenever a specific event takes place"
                ],
                "correct_answer": "A",
                "explanation": "La co-creazione implica la collaborazione attiva con gli stakeholder e gli influencer chiave per definire e adottare modalità di lavoro condivise nell'ecosistema del progetto."
            },
            {
                "id": 10,
                "category": "Understand people",
                "question": "Which is NOT an aspect of leadership?",
                "options": [
                "A. Instructing the execution of tasks in line with agreed ways of working",
                "B. Motivating people to achieve a project's objectives",
                "C. Persuading, influencing, and co-creating with stakeholders",
                "D. Seeking regular feedback to remain aligned to the project's objectives"
                ],
                "correct_answer": "A",
                "explanation": "Istruire sull'esecuzione delle attività è considerata un'attività di 'management' (gestione), mentre motivare, persuadere, co-creare e cercare feedback rientrano nella 'leadership'."
            },
            {
                "id": 11,
                "category": "Understand people",
                "question": "Which activity should be managed carefully as part of 'leading across organizational boundaries', because it is likely to be performed by people outside the project team?",
                "options": [
                "A. Securing funding from the business layer for the business case",
                "B. Integrating new products into each impacted area of the business",
                "C. Gaining commitment for the realization of benefits post-project",
                "D. Delivering the products to the agreed quality specifications"
                ],
                "correct_answer": "B",
                "explanation": "L'integrazione dei nuovi prodotti nelle aree operative del business (Business as Usual) è un'attività spesso svolta da persone esterne al team di progetto stretto (es. gli utenti finali), rendendo cruciale la leadership attraverso i confini organizzativi."
            },
            {
                "id": 12,
                "category": "Understand people",
                "question": "Why is change management important in a project?",
                "options": [
                "A. Because stakeholders should understand which organizational areas are impacted by the project",
                "B. Because the project products should be described and subject to change control",
                "C. Because confidence is needed that the project can meet its scope objectives and continues to be justified",
                "D. Because user's quality expectations of the project products should be understood"
                ],
                "correct_answer": "A",
                "explanation": "In PRINCE2 7, il 'change management' (inteso come gestione del cambiamento organizzativo) è fondamentale affinché gli stakeholder comprendano quali aree dell'organizzazione saranno impattate e possano prepararsi alla transizione."
            },
            {
                "id": 13,
                "category": "Understand people",
                "question": "Which statement about capability and competency within a project is CORRECT?",
                "options": [
                "A. Teams should consist of members with similar capabilities and competencies",
                "B. Team members are likely to perform differently depending on the structure of the team",
                "C. Standard roles and responsibilities should be used, focused on the project's needs",
                "D. Career progression of project team members is often the responsibility of the project manager"
                ],
                "correct_answer": "B",
                "explanation": "Le prestazioni dei membri del team sono influenzate dalle dinamiche e dalla struttura del team stesso. Combinare competenze diverse in strutture adeguate ottimizza i risultati."
            },
            {
                "id": 14,
                "category": "Understand people",
                "question": "What is a description of a purpose of the change management approach?",
                "options": [
                "A. To describe how proposals to change the project baseline should be recorded and approved",
                "B. To describe the standards required to deliver products that meet user's expectations",
                "C. To define how the business will need to operate in the future to meet the project objectives",
                "D. To describe the processes and procedures required to manage uncertainty"
                ],
                "correct_answer": "C",
                "explanation": "Il 'change management approach' (approccio alla gestione del cambiamento organizzativo) serve a definire come l'azienda dovrà operare in futuro per integrare i risultati del progetto e raggiungere gli obiettivi prefissati."
            },
            {
                "id": 15,
                "category": "Understand principles",
                "question": "A project holds a workshop to share experiences of new ways of working between project team members. Which principle is being applied by the 'people' element?",
                "options": [
                "A. Learn from experience",
                "B. Manage by exception",
                "C. Define roles, responsibilities and relationships",
                "D. Focus on products"
                ],
                "correct_answer": "A",
                "explanation": "Condividere le esperienze su nuovi metodi di lavoro durante un workshop è un'applicazione diretta del principio 'Imparare dall'esperienza' (Learn from experience)."
            },
            {
                "id": 16,
                "category": "Understand practices",
                "question": "Which management product should the project board approve to commit to the project scope and timescale?",
                "options": [
                "A. Project mandate",
                "B. Benefits management approach",
                "C. Project initiation documentation",
                "D. Business case"
                ],
                "correct_answer": "C",
                "explanation": "La Project Initiation Documentation (PID) consolida tutte le informazioni chiave di pianificazione. La sua approvazione da parte del Project Board rappresenta l'impegno formale verso l'ambito e le tempistiche del progetto."
            },
            {
                "id": 17,
                "category": "Understand practices",
                "question": "What is a purpose of the business case practice?",
                "options": [
                "A. To enable the project executive to decide whether to continue with the project",
                "B. To identify the user's quality expectations to meet the business need",
                "C. To prevent the planned outcomes from causing dis-benefits to the business",
                "D. To define the products and how they will be delivered to satisfy the business case"
                ],
                "correct_answer": "A",
                "explanation": "Lo scopo primario della pratica del Business Case è fornire le informazioni necessarie per valutare la continua desiderabilità, fattibilità e realizzabilità del progetto, supportando il Project Executive nelle decisioni."
            },
            {
                "id": 18,
                "category": "Understand practices",
                "question": "Which should be used to justify whether the project should be progressed?",
                "options": [
                "A. Project brief and benefits management approach",
                "B. Highlight report and benefits management approach",
                "C. Business case and highlight report",
                "D. Project brief and business case"
                ],
                "correct_answer": "D",
                "explanation": "Il Project Brief (nelle fasi iniziali) e il Business Case (durante l'esecuzione) sono i documenti fondamentali utilizzati per giustificare se un progetto debba essere avviato o fatto avanzare."
            },
            {
                "id": 19,
                "category": "Understand key concepts",
                "question": "Identify the missing word(s) in the following sentence: A business objective is the measurable outcomes that demonstrate progress in relation to [?] and to which the project should contribute.",
                "options": [
                "A. organization's strategy",
                "B. the outputs desired by the business",
                "C. the benefits desired by the business",
                "D. the business justification"
                ],
                "correct_answer": "A",
                "explanation": "Gli obiettivi di business sono risultati misurabili che dimostrano i progressi rispetto alla strategia dell'organizzazione (organization's strategy)."
            },
            {
                "id": 20,
                "category": "Understand practices",
                "question": "A government department has a target to reduce its carbon footprint by 8-12%. How should this requirement be captured?",
                "options": [
                "A. As a benefits tolerance",
                "B. As a sustainability tolerance",
                "C. As outcomes to be achieved",
                "D. As a quality tolerance"
                ],
                "correct_answer": "B",
                "explanation": "In PRINCE2 7, la sostenibilità (Sustainability) è uno dei sette aspetti delle prestazioni del progetto. Un target del genere, con un range accettabile (8-12%), viene catturato come 'sustainability tolerance'."
            },
            {
                "id": 21,
                "category": "Understand practices",
                "question": "During a stage, the project manager recorded a new risk on the risk register. In which step of the business case management technique should its impact on the business case be assessed?",
                "options": [
                "A. Develop",
                "B. Check",
                "C. Maintain",
                "D. Confirm"
                ],
                "correct_answer": "B",
                "explanation": "Nel ciclo di gestione del Business Case, il passaggio 'Check' (Verifica) serve proprio a valutare in modo continuo come i nuovi rischi o le problematiche incidano sulla fattibilità e sulla giustificazione del progetto."
            },
            {
                "id": 22,
                "category": "Understand principles",
                "question": "The project manager has received feedback from stakeholders identifying the need to change the project team structure. Which principle is being applied by the 'organizing' practice when actioning this feedback?",
                "options": [
                "A. Learn from experience",
                "B. Define roles, responsibilities, and relationships",
                "C. Manage by stages",
                "D. Tailor to suit the project"
                ],
                "correct_answer": "D",
                "explanation": "Modificare la struttura del team per adattarsi a nuovi feedback o necessità contingenti è un perfetto esempio del principio 'Tailor to suit the project' (Adattare in base al contesto del progetto)."
            },
            {
                "id": 23,
                "category": "Understand practices",
                "question": "Which management product should specify individual accountability for sustainability targets?",
                "options": [
                "A. Role descriptions",
                "B. Project management team structure",
                "C. Product description",
                "D. Business case"
                ],
                "correct_answer": "A",
                "explanation": "Le descrizioni dei ruoli (Role descriptions) documentano le responsabilità e le accountability specifiche assegnate a ciascun individuo all'interno del team di gestione del progetto."
            },
            {
                "id": 24,
                "category": "Understand practices",
                "question": "What is defined as having the authority to direct the project within the remit set by the business?",
                "options": [
                "A. Project manager",
                "B. Project executive",
                "C. Project management team",
                "D. Project board"
                ],
                "correct_answer": "D",
                "explanation": "Il Project Board è l'organo che ha l'autorità finale e la responsabilità di dirigere il progetto, operando all'interno dei confini e dei mandati stabiliti dal livello direttivo aziendale."
            },
            {
                "id": 25,
                "category": "Understand practices",
                "question": "How should the senior user fulfil their responsibility for continued realization of benefits post-project?",
                "options": [
                "A. By representing the work needed in a hierarchy to help organize the project",
                "B. By ensuring commitment from people in the user community to adopting the new products",
                "C. By defining how to assure the continued justification of the project",
                "D. By ensuring the technical integrity of the project products delivered to the users"
                ],
                "correct_answer": "B",
                "explanation": "Il Senior User garantisce la realizzazione dei benefici assicurandosi che la comunità degli utenti si impegni attivamente ad adottare e utilizzare i nuovi prodotti forniti dal progetto."
            },
            {
                "id": 26,
                "category": "Understand practices",
                "question": "A new team member has just joined the project team and will be going on a site visit. In which step of the organizational design and development technique should this occur?",
                "options": [
                "A. Develop the project ecosystem",
                "B. Understand the organizational ecosystem",
                "C. Design the project ecosystem",
                "D. Manage the ongoing changes to the project ecosystem"
                ],
                "correct_answer": "A",
                "explanation": "Le attività di onboarding e integrazione di nuovi membri, incluse le visite in loco per comprendere il contesto, fanno parte del processo di sviluppo dell'ecosistema di progetto (Develop the project ecosystem)."
            },
            {
                "id": 27,
                "category": "Understand practices",
                "question": "What is the purpose of the plans practice?",
                "options": [
                "A. To enable the project manager to control the project by defining who will deliver the products, and when to deliver them",
                "B. To enable the project executive to monitor whether the project is desirable, viable and achievable and should continue",
                "C. To allow the project executive to define which role in the project management team is responsible for producing the plan",
                "D. To allow the project manager to plan how to respond to uncertainties and who should action the agreed responses"
                ],
                "correct_answer": "A",
                "explanation": "La pratica dei Piani serve a facilitare la comunicazione e il controllo definendo in modo chiaro il modo in cui i prodotti verranno rilasciati, identificando il 'chi', il 'come' e il 'quando'."
            },
            {
                "id": 28,
                "category": "Understand practices",
                "question": "The business strategy has changed, requiring the scope of the project to be increased beyond the tolerances that have been agreed by the business layer. Which plan should be produced to include this change?",
                "options": [
                "A. Project plan",
                "B. Stage plan",
                "C. Team plan",
                "D. Exception plan"
                ],
                "correct_answer": "D",
                "explanation": "Quando si prevede che le tolleranze concordate (in questo caso, a livello di progetto o stage) vengano superate, è necessario creare un Piano di Eccezione (Exception Plan) per gestire la deviazione."
            },
            {
                "id": 29,
                "category": "Understand key concepts",
                "question": "Identify the missing word in the following sentence: When planning, there are at least two types of [?] relevant to a project: internal and external.",
                "options": [
                "A. dependency",
                "B. plan",
                "C. exception",
                "D. scope"
                ],
                "correct_answer": "A",
                "explanation": "Nella pianificazione, le dipendenze (dependencies) possono essere interne (tra attività dello stesso progetto) o esterne (legate a fattori o progetti esterni)."
            },

        // Distribuzione ufficiale basata sui nuovi nomi categorie
        const PRINCE2_DISTRIBUTION = [
            { cat: "Understand key concepts", pct: 10 },
            { cat: "Understand principles", pct: 10 },
            { cat: "Understand people", pct: 10 },
            { cat: "Understand practices", pct: 50 },
            { cat: "Understand processes", pct: 20 }
        ];

        let activeTest = [];
        let currentIdx = 0;
        let answers = [];
        let timerInterval;
        let history = JSON.parse(localStorage.getItem('p2_history') || '[]');

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(`screen-${id}`).classList.add('active');
        }

        function startQuiz(count) {
            const useAI = document.getElementById('ai-toggle').checked;
            const fullPool = useAI ? [...QUESTIONS, ...AI_QUESTIONS] : QUESTIONS;
            
            if (fullPool.length === 0) {
                alert("Errore: Il database delle domande è vuoto. Incolla i dati nel codice.");
                return;
            }

            activeTest = [];
            answers = new Array(count).fill(null);
            currentIdx = 0;

            PRINCE2_DISTRIBUTION.forEach(dist => {
                const targetCount = Math.round((dist.pct / 100) * count);
                const categoryPool = fullPool.filter(q => q.category === dist.cat);
                const shuffledCat = categoryPool.sort(() => 0.5 - Math.random());
                activeTest.push(...shuffledCat.slice(0, targetCount));
            });

            activeTest = activeTest.sort(() => 0.5 - Math.random()).slice(0, count);

            showScreen('quiz');
            renderQuestion();
            startTimer(count === 60 ? 3600 : count * 60);
        }

        function renderQuestion() {
            const q = activeTest[currentIdx];
            const container = document.getElementById('question-container');
            
            document.getElementById('progress-fill').style.width = `${((currentIdx + 1) / activeTest.length) * 100}%`;
            document.getElementById('category-tag').innerText = q.category;

            container.innerHTML = `
                <h3>Domanda ${currentIdx + 1} di ${activeTest.length}</h3>
                <p style="font-size: 1.1rem; line-height: 1.6;">${q.question}</p>
                <div class="options">
                    ${q.options.map((opt, i) => `
                        <div class="option ${answers[currentIdx] === i ? 'selected' : ''}" onclick="selectOption(${i})">
                            ${opt}
                        </div>
                    `).join('')}
                </div>
            `;

            document.getElementById('btn-prev').style.visibility = currentIdx === 0 ? 'hidden' : 'visible';
            document.getElementById('btn-next').innerText = currentIdx === activeTest.length - 1 ? 'Concludi Test' : 'Avanti';
        }

        function selectOption(idx) {
            answers[currentIdx] = idx;
            renderQuestion();
        }

        function nextQuestion() {
            if(currentIdx < activeTest.length - 1) {
                currentIdx++;
                renderQuestion();
            } else {
                finishQuiz();
            }
        }

        function prevQuestion() {
            if(currentIdx > 0) {
                currentIdx--;
                renderQuestion();
            }
        }

        function finishQuiz() {
            clearInterval(timerInterval);
            let score = 0;
            const reviewBox = document.getElementById('review-container');
            reviewBox.innerHTML = '';

            activeTest.forEach((q, i) => {
                // Converte indice risposta (0,1,2,3) in lettera (A,B,C,D)
                const selectedLetter = answers[i] !== null ? String.fromCharCode(65 + answers[i]) : null;
                const isCorrect = selectedLetter === q.correct_answer;
                if(isCorrect) score++;

                const card = document.createElement('div');
                card.className = `question-card`;
                card.style.borderLeft = `5px solid ${isCorrect ? 'var(--success)' : 'var(--danger)'}`;
                
                // Calcola l'indice della risposta corretta per mostrarla
                const correctIdx = q.correct_answer.charCodeAt(0) - 65;

                card.innerHTML = `
                    <div style="font-size:0.8rem; color:var(--text-dim)">${q.category}</div>
                    <p><strong>${i+1}. ${q.question}</strong></p>
                    <div class="options">
                        <div class="option ${isCorrect ? 'correct' : 'incorrect'}">
                            Tua risposta: ${answers[i] !== null ? q.options[answers[i]] : 'Non risposta'}
                        </div>
                        ${!isCorrect ? `<div class="option correct">Corretta: ${q.options[correctIdx]}</div>` : ''}
                    </div>
                    <div style="margin-top:10px; font-size:0.85rem; color:var(--text-dim); background:#0f172a; padding:10px; border-radius:8px; border:1px solid #334155">
                        <strong>Spiegazione:</strong> ${q.explanation}
                    </div>
                `;
                reviewBox.appendChild(card);
            });

            const pct = Math.round((score / activeTest.length) * 100);
            history.push({ date: new Date().toLocaleString(), score, total: activeTest.length, pct });
            localStorage.setItem('p2_history', JSON.stringify(history));

            const summary = document.getElementById('result-summary');
            summary.innerHTML = `<h2 class="${pct >= 60 ? 'pass' : 'fail'}">${pct >= 60 ? 'PASS' : 'FAIL'}</h2><h1>${score} / ${activeTest.length} (${pct}%)</h1>`;
            summary.style.background = pct >= 60 ? 'rgba(34,197,94,0.1)' : 'rgba(239,68,68,0.1)';
            
            showScreen('results');
        }

        function startTimer(seconds) {
            let t = seconds;
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                const m = Math.floor(t / 60);
                const s = t % 60;
                document.getElementById('quiz-timer').innerText = `${m}:${s < 10 ? '0'+s : s}`;
                if(t <= 0) { clearInterval(timerInterval); finishQuiz(); }
                t--;
            }, 1000);
        }

        function showHistory() {
            const list = document.getElementById('history-list');
            list.innerHTML = history.length ? [...history].reverse().map(h => `
                <div class="question-card" style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px">
                    <div>
                        <div style="font-size:0.8rem">${h.date}</div>
                        <strong>${h.score}/${h.total} (${h.pct}%)</strong>
                    </div>
                    <div class="${h.pct >= 60 ? 'pass' : 'fail'}" style="font-weight:bold">${h.pct >= 60 ? 'PASS' : 'FAIL'}</div>
                </div>
            `).join('') : '<p>Nessun test completato.</p>';
            showScreen('history');
        }

        function startHardMode() {
            alert("Hard Mode: Inizierai un quiz basato sugli ultimi errori salvati (Logica placeholder).");
            startQuiz(20);
        }
    </script>
