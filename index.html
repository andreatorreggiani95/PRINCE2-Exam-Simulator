<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRINCE2 7 Pro - Simulator V3.3</title>
    <style>
        :root {
            --bg: #0f172a; --card: #1e293b; --primary: #38bdf8;
            --secondary: #818cf8; --text: #f1f5f9; --text-dim: #94a3b8;
            --success: #22c55e; --danger: #ef4444; --accent: #f59e0b;
            --warning: #facc15;
        }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 10px; display: flex; justify-content: center; }
        .app-container { max-width: 1000px; width: 100%; background: var(--card); padding: 30px; border-radius: 24px; box-shadow: 0 25px 50px rgba(0,0,0,0.5); min-height: 90vh; position: relative; }
        
        nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 15px; }
        .logo { font-weight: 800; font-size: 1.5rem; background: linear-gradient(to right, var(--primary), var(--secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        #timer-display {
            position: sticky; top: 10px; z-index: 100; background: rgba(15, 23, 42, 0.9);
            padding: 10px 20px; border-radius: 50px; border: 2px solid var(--primary);
            font-weight: 800; font-size: 1.2rem; text-align: center; margin-bottom: 20px;
            backdrop-filter: blur(5px); display: none;
        }

        .dashboard-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; margin-bottom: 30px; }
        .stat-box { background: rgba(255,255,255,0.03); padding: 15px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.05); text-align: center; }
        .stat-box small { color: var(--text-dim); text-transform: uppercase; font-size: 0.7rem; }
        .stat-box div { font-size: 1.4rem; font-weight: 700; color: var(--primary); }

        .management-section { background: rgba(255,255,255,0.02); padding: 20px; border-radius: 16px; margin-top: 20px; border: 1px solid rgba(255,255,255,0.05); }
        .history-item { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 0.9rem; }
        
        .btn { padding: 10px 20px; border-radius: 10px; border: none; cursor: pointer; font-weight: 700; transition: 0.2s; font-size: 0.9rem; }
        .btn-primary { background: var(--primary); color: #0f172a; }
        .btn-danger { background: rgba(239, 68, 68, 0.2); color: var(--danger); border: 1px solid var(--danger); }
        .btn-ghost { background: transparent; color: var(--text-dim); border: 1px solid #334155; }
        
        .q-card { background: rgba(255,255,255,0.02); padding: 20px; border-radius: 16px; margin-bottom: 20px; border-left: 4px solid var(--secondary); }
        .option { display: block; padding: 14px; background: #1e293b; border: 1px solid #334155; border-radius: 10px; margin: 10px 0; cursor: pointer; }
        .correct { border-color: var(--success) !important; background: rgba(34, 197, 94, 0.1) !important; }
        .incorrect { border-color: var(--danger) !important; background: rgba(239, 68, 68, 0.1) !important; }
        .hidden { display: none; }
        .pass { color: var(--success); } .fail { color: var(--danger); }
    </style>
</head>
<body>

<div class="app-container">
    <nav>
        <div class="logo">PRINCE2 V3.3 PRO</div>
        <button class="btn btn-ghost" onclick="cancelExam()">🏠 Home</button>
    </nav>

    <div id="timer-display">Tempo Rimanente: <span id="timer-clock">00:00</span></div>

    <div id="home-screen" class="screen">
        <div class="dashboard-grid" id="db-stats"></div>
        
        <div class="dashboard-grid">
            <div class="stat-box" style="grid-column: span 2;">
                <small>Configura Test</small>
                <div style="margin: 10px 0;">
                    Numero Domande: <input type="number" id="quiz-size" value="60" min="5" max="100" style="width: 60px; background: #0f172a; color: white; border: 1px solid #334155; padding: 5px; border-radius: 5px;">
                </div>
                <button class="btn btn-primary" style="background: var(--success); color: white; width: 100%;" onclick="initQuiz()">Avvia Simulazione Bilanciata</button>
            </div>
        </div>

        <div class="management-section">
            <h3 style="margin-top:0; color: var(--secondary)">Storico Risultati</h3>
            <div id="score-history"></div>
            <button class="btn btn-danger" style="margin-top: 15px; font-size: 0.75rem;" onclick="resetHistory()">Reset Storico</button>
        </div>
    </div>

    <div id="quiz-screen" class="screen hidden">
        <div id="quiz-content"></div>
        <button id="finish-btn" class="btn btn-primary" style="width:100%; margin-top:20px" onclick="finishQuiz()">Consegna Esame</button>
    </div>

    <div id="result-screen" class="screen hidden">
        <div id="result-summary" style="text-align:center; padding: 30px; border-radius: 20px; margin-bottom: 20px;"></div>
        <div id="review-content"></div>
        <button class="btn btn-primary" style="width:100%" onclick="showScreen('home')">Torna alla Dashboard</button>
    </div>
</div>

<script>
    // Pesi ufficiali per la distribuzione delle domande

        {
            "id": 18,

            "options": ["A. After reporting to the project board that a stage tolerance is likely to be exceeded", "B. After receiving advice from the project board in response to a highlight report", "C. After requesting the project board to approve an exception plan for the stage", "D. After requesting the project board to approve a change to the project team"],
            "correct_answer": "C",
            "explanation": "Il PM ri-pianifica il resto di uno stage (tramite la stesura di un Exception Plan) durante il processo SB dopo aver segnalato un'eccezione al Project Board e averne ricevuto mandato per procedere con la ri-pianificazione correttiva."
        },
        {
            "id": 119,
            "category": "Understand processes",
            "question": "Which describes how the 'controlling a stage' process may be used?",
            "options": ["A. It could be used by the project manager to monitor the initiation stage of a large project", "B. It could be omitted if the team manager role is being fulfilled by the project manager", "C. It could be merged with the 'managing a stage boundary' process if appropriate", "D. It could be omitted if the team managers are internal to the business"],
            "correct_answer": "A",
            "explanation": "In progetti di grandi dimensioni, la fase di Iniziazione stessa può essere gestita formalmente come un vero e proprio Stage, utilizzando il processo 'Controlling a Stage' per monitorarne l'avanzamento."
        },
        {
            "id": 120,
            "category": "Understand processes",
            "question": "Which describes a project characteristic that drives the need for the 'closing a project' process?",
            "options": ["A. A project should hand over the desired change to business as usual", "B. A project is delivered using a new project team", "C. A project uses resources from different departments", "D. A project deals with higher levels of uncertainty"],
            "correct_answer": "A",
            "explanation": "I progetti sono temporanei. Il processo di Chiusura è necessario proprio perché i risultati del progetto (il cambiamento desiderato) devono essere formalmente trasferiti alle normali operazioni aziendali (Business as Usual) per un uso continuativo."
        }
    ];

    let history = JSON.parse(localStorage.getItem('p2_history')) || [];
    let activeTest = [];
    let timerInterval;

    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
        document.getElementById(`${id}-screen`).classList.remove('hidden');
        document.getElementById('timer-display').style.display = (id === 'quiz') ? 'block' : 'none';
        if(id === 'home') { renderHome(); clearInterval(timerInterval); }
    }

    function renderHome() {
        // Ripristino visualizzazione categorie
        const stats = document.getElementById('db-stats');
        const counts = {}; 
        Object.keys(WEIGHTS).forEach(c => counts[c] = 0);
        database.forEach(q => { if(counts[q.category] !== undefined) counts[q.category]++; });

        stats.innerHTML = Object.entries(counts).map(([cat, n]) => `
            <div class="stat-box">
                <small>${cat.replace('Understand ', '')}</small>
                <div>${n}</div>
            </div>
        `).join('') + `<div class="stat-box" style="border-color:var(--primary)"><small>Totale DB</small><div>${database.length}</div></div>`;

        const histDiv = document.getElementById('score-history');
        histDiv.innerHTML = history.length ? history.slice().reverse().map(h => `
            <div class="history-item">
                <span>${h.date}</span>
                <span><strong>${h.score}/${h.total}</strong></span>
                <span class="${h.pct >= 60 ? 'pass' : 'fail'}">${h.pct}%</span>
            </div>
        `).join('') : '<p style="color:var(--text-dim)">Nessun test registrato.</p>';
    }

    function resetHistory() {
        if(confirm("Cancellare lo storico dei punteggi?")) {
            localStorage.removeItem('p2_history');
            history = [];
            renderHome();
        }
    }

    function initQuiz() {
        const size = parseInt(document.getElementById('quiz-size').value);
        activeTest = [];
        
        // Logica di distribuzione basata sui pesi (Weights)
        Object.entries(WEIGHTS).forEach(([cat, w]) => {
            const pool = database.filter(q => q.category === cat).sort(() => 0.5 - Math.random());
            const needed = Math.max(1, Math.round(size * w));
            activeTest.push(...pool.slice(0, needed));
        });
        
        // Mescolamento finale e taglio alla dimensione desiderata
        activeTest = activeTest.sort(() => 0.5 - Math.random()).slice(0, size);
        
        document.getElementById('quiz-content').innerHTML = activeTest.map((q, i) => `
            <div class="q-card" id="qc-${i}">
                <small style="color:var(--secondary)">${q.category}</small>
                <p><strong>${i+1}.</strong> ${q.question}</p>
                ${q.options.map(o => `<label class="option"><input type="radio" name="q-${i}" value="${o[0]}"> ${o}</label>`).join('')}
            </div>
        `).join('');
        
        showScreen('quiz');
        startTimer(size);
    }

    function startTimer(minutes) {
        let seconds = minutes * 60;
        const display = document.getElementById('timer-clock');
        const container = document.getElementById('timer-display');
        clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            let mins = Math.floor(seconds / 60);
            let secs = seconds % 60;
            display.innerText = `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
            if (seconds <= 0) { clearInterval(timerInterval); finishQuiz(); }
            seconds--;
        }, 1000);
    }

    function finishQuiz() {
        clearInterval(timerInterval);
        let score = 0;
        const reviewBox = document.getElementById('review-content');
        reviewBox.innerHTML = "";

        activeTest.forEach((q, i) => {
            const sel = document.querySelector(`input[name="q-${i}"]:checked`);
            const card = document.getElementById(`qc-${i}`).cloneNode(true);
            const selectedVal = sel ? sel.value : null;

            card.querySelectorAll('input').forEach(input => {
                if(input.value === selectedVal) input.checked = true;
                input.disabled = true;
            });

            card.querySelectorAll('.option').forEach(opt => {
                const val = opt.querySelector('input').value;
                if(val === q.correct_answer) opt.classList.add('correct');
                if(selectedVal === val && val !== q.correct_answer) opt.classList.add('incorrect');
            });

            if(selectedVal === q.correct_answer) score++;
            
            const exp = document.createElement('div');
            exp.style = "margin-top:10px; font-size:0.85rem; color:var(--text-dim); background:#0f172a; padding:10px; border-radius:8px; border:1px solid #334155";
            exp.innerHTML = `<strong>Spiegazione:</strong> ${q.explanation}`;
            card.appendChild(exp);
            reviewBox.appendChild(card);
        });

        const pct = Math.round((score / activeTest.length) * 100);
        history.push({ date: new Date().toLocaleString(), score, total: activeTest.length, pct });
        localStorage.setItem('p2_history', JSON.stringify(history));

        const summary = document.getElementById('result-summary');
        summary.innerHTML = `<h2 class="${pct >= 60 ? 'pass' : 'fail'}">${pct >= 60 ? 'PASS' : 'FAIL'}</h2><h1>${score} / ${activeTest.length} (${pct}%)</h1>`;
        summary.style.background = pct >= 60 ? 'rgba(34,197,94,0.1)' : 'rgba(239,68,68,0.1)';
        
        showScreen('result');
        window.scrollTo(0,0);
    }

    function cancelExam() { if(confirm("Annullare l'esame?")) showScreen('home'); }
    
    // Inizializzazione
    renderHome();
</script>
